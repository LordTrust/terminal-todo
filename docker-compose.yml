services:
  app:
    image: ${IMAGE:-ghcr.io/lordtrust/terminal-todo:latest}
    init: true
    ports:
      - "${PORT}:${PORT}"
    labels:
      - traefik.enable=true
      - traefik.docker.network=${COMPOSE_PROJECT_NAME}_default
      - traefik.http.services.${COMPOSE_PROJECT_NAME}-svc.loadbalancer.server.port=${PORT}
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}-ui.rule=Host(`${TRAEFIK_HOST}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}-ui.entrypoints=websecure
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}-ui.tls.certresolver=letsencrypt
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}-ui.service=${COMPOSE_PROJECT_NAME}-svc
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:' + os.environ['PORT'] + '/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
