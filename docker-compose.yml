services:
  terminal-todo:
    build: .
    container_name: ${CONTAINER_NAME:-terminal-todo}
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      PORT: 8080
      DATABASE_PATH: /app/data/terminal_todo.db
    volumes:
      - terminal_todo_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  terminal_todo_data:
